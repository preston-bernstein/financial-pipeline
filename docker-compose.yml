services:
  postgres:
    image: postgres:17-alpine
    platform: linux/amd64
    environment:
      POSTGRES_USER: pipeline
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: pipeline
    volumes:
      - postgres_data:/var/lib/postgresql/data
    secrets:
      - postgres_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipeline"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: financial-pipeline/migrate
    build:
      context: .
      dockerfile: packages/db/Dockerfile
      platforms: ["linux/amd64"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
    secrets:
      - postgres_password
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  plaid-tap:
    image: financial-pipeline/plaid-tap
    build:
      context: .
      dockerfile: services/plaid-tap/Dockerfile
      platforms: ["linux/amd64"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      LOKI_URL: ${LOKI_URL}
    volumes:
      - plaid_cursors:/data
    secrets:
      - postgres_password
      - plaid_credentials
    depends_on:
      migrate:
        condition: service_completed_successfully

  betterment-adapter:
    image: financial-pipeline/betterment-adapter
    build:
      context: .
      dockerfile: services/betterment-adapter/Dockerfile
      platforms: ["linux/amd64"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      LOKI_URL: ${LOKI_URL}
      NTFY_URL: ${NTFY_URL}
      NTFY_TOPIC: ${NTFY_TOPIC}
    volumes:
      - betterment_session:/session
    secrets:
      - postgres_password
    depends_on:
      migrate:
        condition: service_completed_successfully

  vanguard-adapter:
    image: financial-pipeline/vanguard-adapter
    build:
      context: .
      dockerfile: services/vanguard-adapter/Dockerfile
      platforms: ["linux/amd64"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      LOKI_URL: ${LOKI_URL}
      NTFY_URL: ${NTFY_URL}
      NTFY_TOPIC: ${NTFY_TOPIC}
    volumes:
      - vanguard_session:/session
    secrets:
      - postgres_password
    depends_on:
      migrate:
        condition: service_completed_successfully

  fidelity-adapter:
    image: financial-pipeline/fidelity-adapter
    build:
      context: .
      dockerfile: services/fidelity-adapter/Dockerfile
      platforms: ["linux/amd64"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      LOKI_URL: ${LOKI_URL}
      NTFY_URL: ${NTFY_URL}
      NTFY_TOPIC: ${NTFY_TOPIC}
    volumes:
      - fidelity_session:/session
    secrets:
      - postgres_password
    depends_on:
      migrate:
        condition: service_completed_successfully

  materializer:
    image: financial-pipeline/materializer
    build:
      context: .
      dockerfile: services/materializer/Dockerfile
      platforms: ["linux/amd64"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      LOKI_URL: ${LOKI_URL}
      NTFY_URL: ${NTFY_URL}
      NTFY_TOPIC: ${NTFY_TOPIC}
      JOURNAL_BROKER_URL: ${JOURNAL_BROKER_URL}
      JOURNAL_MODEL: ${JOURNAL_MODEL:-llama3.2}
    secrets:
      - postgres_password
    depends_on:
      migrate:
        condition: service_completed_successfully

  llm-enricher:
    image: financial-pipeline/llm-enricher
    build:
      context: .
      dockerfile: services/llm-enricher/Dockerfile
      platforms: ["linux/amd64"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      LOKI_URL: ${LOKI_URL}
      NTFY_URL: ${NTFY_URL}
      NTFY_TOPIC: ${NTFY_TOPIC}
      OLLAMA_BROKER_URL: ${OLLAMA_BROKER_URL}
      ENRICHER_MODEL: ${ENRICHER_MODEL:-llama3.2:3b}
    secrets:
      - postgres_password
    depends_on:
      migrate:
        condition: service_completed_successfully

  mcp-server:
    image: financial-pipeline/mcp-server
    build:
      context: .
      dockerfile: services/mcp-server/Dockerfile
      platforms: ["linux/amd64"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MCP_PORT: ${MCP_PORT}
      LOKI_URL: ${LOKI_URL}
    ports:
      - "${MCP_PORT}:${MCP_PORT}"
    volumes:
      - ./pipeline.config.toml:/config/pipeline.config.toml:ro
    secrets:
      - postgres_password
    depends_on:
      migrate:
        condition: service_completed_successfully

  loki:
    image: grafana/loki:3.0.0
    platform: linux/amd64
    volumes:
      - loki_data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  grafana:
    image: grafana/grafana:11.0.0
    platform: linux/amd64
    environment:
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_password
    ports:
      - "${GRAFANA_PORT}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    secrets:
      - grafana_password
    depends_on:
      loki:
        condition: service_healthy
      postgres:
        condition: service_healthy

  ntfy:
    image: binwiederhier/ntfy:v2.11.0
    platform: linux/amd64
    command: serve
    volumes:
      - ntfy_data:/var/lib/ntfy


volumes:
  postgres_data:
  plaid_cursors:
  betterment_session:
  vanguard_session:
  fidelity_session:
  loki_data:
  grafana_data:
  ntfy_data:

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  grafana_password:
    file: ./secrets/grafana_password.txt
  plaid_credentials:
    file: ./secrets/plaid_credentials.json
